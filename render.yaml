services:
  - type: web
    name: hookscope-api
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @hookscope/shared db:generate && pnpm --filter @hookscope/shared build && pnpm --filter @hookscope/api build
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hookscope-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://hookscope-plum.vercel.app
      - key: API_PORT
        value: 10000
      - key: GRAPH_API_KEY
        sync: false
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: ETHEREUM_RPC_URL
        sync: false
      - key: ARBITRUM_RPC_URL
        sync: false
      - key: BASE_RPC_URL
        sync: false
      - key: OPTIMISM_RPC_URL
        sync: false

databases:
  - name: hookscope-db
    databaseName: hookscope
    user: hookscope
    plan: free
