[phases.setup]
nixPkgs = ["nodejs_20", "nodePackages.pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @hookscope/shared db:generate",
  "pnpm --filter @hookscope/shared build",
  "pnpm --filter @hookscope/api build"
]

[start]
cmd = "node apps/api/dist/index.js"
